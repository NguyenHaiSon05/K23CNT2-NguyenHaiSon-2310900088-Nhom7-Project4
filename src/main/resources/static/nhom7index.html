<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skincare Perfect</title>
    <link rel="stylesheet" href="/nhom7css/nhom7style.css">
</head>
<body>

<header class="nhom7-header">

    <div class="nhom7-logo">
        Skincare Perfect
    </div>

    <nav class="nhom7-nav">

        <a href="/">Trang chủ</a>

        <a href="#nhom7-product-list">
            Sản phẩm
        </a>
        <a href="/nhom7cart.html">
            Giỏ hàng
        </a>

        <div id="nhom7-user-area"></div>

    </nav>

</header>

<section class="nhom7-home-top">

    <!-- LEFT MENU -->

    <div class="nhom7-category-box">

        <h3>Danh mục sản phẩm</h3>

        <ul class="nhom7-category-menu">

            <li onclick="nhom7RenderProducts(nhom7AllProducts)">
                Tất cả
            </li>

            <li onclick="nhom7FilterCategory('Tẩy trang')">
                Tẩy trang
            </li>

            <li onclick="nhom7FilterCategory('Sữa rửa mặt')">
                Sữa rửa mặt
            </li>

            <li onclick="nhom7FilterCategory('Toner')">
                Toner
            </li>

            <li onclick="nhom7FilterCategory('Serum')">
                Serum
            </li>

            <li onclick="nhom7FilterCategory('Kem dưỡng')">
                Kem dưỡng
            </li>

            <li onclick="nhom7FilterCategory('Kem chống nắng')">
                Kem chống nắng
            </li>

        </ul>

    </div>

    <!-- CENTER BANNER -->

    <div class="nhom7-main-banner">

        <img
                src="/nhom7images/banner.png"
                alt=""
        >

    </div>

    <!-- RIGHT ADS -->

    <div class="nhom7-side-banner">

        <img
                src="/nhom7images/banner-right1.png"
                alt=""
        >

        <img
                src="/nhom7images/banner-right2.png"
                alt=""
        >

    </div>

</section>

<main class="nhom7-container">
    <h2>Danh sách sản phẩm</h2>

    <div id="nhom7-product-list"></div>
</main>

<footer class="nhom7-footer">
    <p>Skincare Perfect © 2026</p>
</footer>

<script src="/nhom7js/nhom7api.js"></script>
<script src="/nhom7js/nhom7product.js"></script>
<script src="/nhom7js/nhom7auth.js"></script>

</body>
</html>
