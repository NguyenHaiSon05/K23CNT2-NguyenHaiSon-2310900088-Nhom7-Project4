<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Nhom7 Skincare</title>
    <link rel="stylesheet" href="/nhom7css/nhom7auth.css">
</head>
<body>

<div class="nhom7-auth-container">
    <div class="nhom7-auth-box">

        <h1>Đăng ký</h1>

        <form id="nhom7-register-form">

            <input
                    type="text"
                    id="fullName"
                    placeholder="Họ và tên"
                    required
            >

            <input
                    type="text"
                    id="username"
                    placeholder="Tên đăng nhập"
                    required
            >

            <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    required
            >

            <input
                    type="password"
                    id="password"
                    placeholder="Mật khẩu"
                    required
            >

            <button type="submit">
                Đăng ký
            </button>

        </form>

        <p>
            Đã có tài khoản?
            <a href="/nhom7login.html">Đăng nhập</a>
        </p>

    </div>
</div>

<!-- nhom7api.js phải load TRƯỚC nhom7register.js -->
<script src="/nhom7js/nhom7api.js"></script>
<script src="/nhom7js/nhom7register.js"></script>

</body>
</html>
